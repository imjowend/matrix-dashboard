server {
    listen 80;

    location ~ ^/(login|process-matrix|rotate-matrix)$ {
        proxy_pass http://api-go:3000;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
